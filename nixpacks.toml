[phases.setup]
nixPkgs = ["python311", "gcc", "libffi", "openssl"]

[phases.install]
cmds = [
  "pip install --upgrade pip --no-cache-dir",
  "pip install --no-cache-dir google-auth google-api-python-client google-auth-httplib2 requests cryptography",
  "pip install --no-cache-dir kerykeion || echo 'kerykeion install failed, astro disabled'"
]

[start]
cmd = "python monitor_loop.py"
