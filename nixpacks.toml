providers = ["python"]

[variables]
NIXPACKS_PYTHON_VERSION = "3.11"

[phases.setup]
aptPkgs = ["libfreetype6-dev", "libpng-dev", "pkg-config", "gcc", "python3-dev", "fonts-noto-color-emoji"]

[phases.install]
cmds = [
  "pip install --upgrade pip --no-cache-dir",
  "pip install --no-cache-dir matplotlib numpy",
  "pip install --no-cache-dir cryptography",
  "pip install --no-cache-dir google-auth google-auth-httplib2 google-api-python-client",
  "pip install --no-cache-dir requests",
  "pip install --no-cache-dir kerykeion==5.12.8",
  "pip install --no-cache-dir yfinance",
  "pip install --no-cache-dir pypdf==4.3.1 python-docx==1.1.2",
  "pip install --no-cache-dir -r requirements.txt"
]

[start]
cmd = "python monitor_loop.py"
