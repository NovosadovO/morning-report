name: Social Digest — Telegram

on:
  schedule:
    - cron: '0 10 * * *'   # 12:00 Košice (UTC+2)
    - cron: '0 17 * * *'   # 19:00 Košice (UTC+2)
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore seen cache
        uses: actions/cache@v4
        with:
          path: /tmp/social_digest_seen.json
          key: social-digest-seen-${{ github.run_number }}
          restore-keys: social-digest-seen-

      - name: Run digest
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python social_digest.py
