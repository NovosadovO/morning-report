name: Monitor — Telegram Alerts

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:           # manual trigger

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: monitor-pip-${{ hashFiles('requirements-monitor.txt') }}

      - name: Install dependencies
        run: pip install -r requirements-monitor.txt

      # Restore price history between runs
      - name: Restore price cache
        uses: actions/cache@v4
        with:
          path: /tmp/monitor_prices.json
          key: monitor-prices-${{ github.run_number }}
          restore-keys: monitor-prices-

      # Restore seen emails list between runs
      - name: Restore email seen cache
        uses: actions/cache@v4
        with:
          path: /tmp/monitor_seen_emails.json
          key: monitor-emails-${{ github.run_number }}
          restore-keys: monitor-emails-

      - name: Run monitor
        env:
          TELEGRAM_TOKEN:                ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:              ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_APP_PASSWORD:            ${{ secrets.GMAIL_APP_PASSWORD }}
          GOOGLE_CALENDAR_CREDENTIALS:   ${{ secrets.GOOGLE_CALENDAR_CREDENTIALS }}
        run: python monitor.py
